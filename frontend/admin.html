<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Readiness — Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; font-family: 'Inter', -apple-system, sans-serif; }
    .login-card { max-width: 400px; margin: 20vh auto; }
    .dashboard { display: none; max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
    .table-sm td, .table-sm th { padding: 0.35rem 0.5rem; font-size: 0.85rem; }
    th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    th.sortable:hover { background: #e9ecef; }
    th.sortable .sort-icon { opacity: 0.3; margin-left: 0.25rem; }
    th.sortable.sort-active .sort-icon { opacity: 1; }
    .score-cell { text-align: center; min-width: 36px; }
    .score-1 { background: #fee2e2; color: #991b1b; }
    .score-2 { background: #fef3c7; color: #92400e; }
    .score-3 { background: #fef9c3; color: #854d0e; }
    .score-4 { background: #dcfce7; color: #166534; }
    .score-5 { background: #bbf7d0; color: #14532d; }
    .score-na { background: #f3f4f6; color: #9ca3af; }
    .avg-cell { font-weight: 600; }
    .status-completed { color: #16a34a; }
    .status-pending { color: #9ca3af; }
    .expand-row { display: none; }
    .expand-row.open { display: table-row; }
    .expand-content { background: #f9fafb; }
    .dim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 0.5rem; }
    .dim-item { font-size: 0.8rem; padding: 0.3rem 0.5rem; border-radius: 4px; background: #fff; border: 1px solid #e5e7eb; }
    .dim-score-badge { display: inline-block; width: 22px; text-align: center; border-radius: 3px; font-weight: 600; font-size: 0.75rem; margin-right: 0.35rem; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .stat-cards { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-card { background: #fff; border-radius: 8px; padding: 1rem 1.5rem; border: 1px solid #e5e7eb; min-width: 140px; }
    .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-card .stat-label { font-size: 0.8rem; color: #6b7280; }
  </style>
</head>
<body>

<div id="login" class="login-card card shadow-sm border-0 p-4">
  <h4 class="mb-3 text-center">Admin Dashboard</h4>
  <p class="text-muted small text-center mb-3">Enter the admin password to continue.</p>
  <div class="mb-3">
    <input type="password" class="form-control" id="admin-key-input" placeholder="Admin password" autofocus>
  </div>
  <div id="login-error" class="text-danger small mb-2 d-none"></div>
  <button class="btn btn-primary w-100" id="login-btn" onclick="doLogin()">
    <i class="bi bi-lock me-1"></i>Sign In
  </button>
</div>

<div id="dashboard" class="dashboard">
  <div class="toolbar">
    <h4 class="mb-0">AI Readiness Dashboard</h4>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm" onclick="downloadCSV()">
        <i class="bi bi-download me-1"></i>Download CSV
      </button>
      <button class="btn btn-outline-secondary btn-sm" onclick="refreshData()">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>
  </div>

  <div id="stat-cards" class="stat-cards"></div>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-sm table-hover mb-0" id="results-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let CATEGORIES = {};
let ALL_DIM_IDS = [];
let DIM_LABELS = {};

let adminKey = '';
let data = [];
let sortCol = 'name';
let sortAsc = true;

async function loadDimensions() {
  const resp = await fetch('/api/config/dimensions');
  if (!resp.ok) throw new Error('Failed to load dimensions config');
  const config = await resp.json();
  const cats = {};
  const allIds = [];
  const labels = {};
  for (const cat of config.categories) {
    const prefix = (cat.prefix || cat.dimensions[0]?.id.match(/^([a-z]+)_/)?.[1] || cat.id.substring(0, 2)).toUpperCase();
    const ids = cat.dimensions.map(d => d.id);
    cats[cat.id] = { key: prefix, label: cat.label, ids };
    ids.forEach(id => {
      allIds.push(id);
      labels[id] = id.replace(/^[a-z]{2}_/, '').replace(/_/g, ' ');
    });
  }
  CATEGORIES = cats;
  ALL_DIM_IDS = allIds;
  DIM_LABELS = labels;
}

function doLogin() {
  adminKey = document.getElementById('admin-key-input').value.trim();
  if (!adminKey) return;
  document.getElementById('login-btn').disabled = true;
  document.getElementById('login-btn').innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Loading...';
  fetchDashboard();
}

document.getElementById('admin-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function fetchDashboard() {
  try {
    if (ALL_DIM_IDS.length === 0) await loadDimensions();
    const resp = await fetch('/api/admin/dashboard', {
      headers: { 'x-admin-key': adminKey },
    });
    if (resp.status === 401) {
      document.getElementById('login-error').textContent = 'Invalid password.';
      document.getElementById('login-error').classList.remove('d-none');
      document.getElementById('login-btn').disabled = false;
      document.getElementById('login-btn').innerHTML = '<i class="bi bi-lock me-1"></i>Sign In';
      return;
    }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const result = await resp.json();
    data = result.respondents || [];
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderAll();
  } catch (err) {
    document.getElementById('login-error').textContent = 'Connection failed: ' + err.message;
    document.getElementById('login-error').classList.remove('d-none');
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').innerHTML = '<i class="bi bi-lock me-1"></i>Sign In';
  }
}

function refreshData() {
  fetchDashboard();
}

function renderAll() {
  renderStats();
  renderTable();
}

function renderStats() {
  const total = data.length;
  const completed = data.filter(r => r.hasSubmission).length;
  const pending = total - completed;
  const avgScores = data.filter(r => r.averageScore !== null).map(r => r.averageScore);
  const overallAvg = avgScores.length > 0 ? (avgScores.reduce((a,b) => a+b, 0) / avgScores.length).toFixed(1) : '—';

  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Respondents</div></div>
    <div class="stat-card"><div class="stat-value text-success">${completed}</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value text-muted">${pending}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-value">${overallAvg}</div><div class="stat-label">Overall Avg Score</div></div>
  `;
}

function catAvg(scores, ids) {
  const vals = ids.map(id => scores[id]).filter(v => v !== null && v !== undefined);
  return vals.length > 0 ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : null;
}

function renderTable() {
  const cats = Object.values(CATEGORIES);
  const cols = [
    { key: 'name', label: 'Name' },
    { key: 'company', label: 'Company' },
    { key: 'status', label: 'Status' },
    { key: 'completedAt', label: 'Completed' },
    { key: 'averageScore', label: 'Avg' },
    ...cats.map(c => ({ key: 'cat_' + c.key, label: c.key })),
  ];

  let headHtml = '<tr>';
  cols.forEach(col => {
    const active = sortCol === col.key ? ' sort-active' : '';
    const icon = sortCol === col.key ? (sortAsc ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-caret-up-fill';
    headHtml += `<th class="sortable${active}" onclick="sortBy('${col.key}')">
      ${col.label}<i class="bi ${icon} sort-icon"></i></th>`;
  });
  headHtml += '<th></th></tr>';
  document.getElementById('table-head').innerHTML = headHtml;

  const sorted = [...data].sort((a, b) => {
    let va = getSortValue(a, sortCol);
    let vb = getSortValue(b, sortCol);
    if (va === null || va === undefined) va = '';
    if (vb === null || vb === undefined) vb = '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  let bodyHtml = '';
  sorted.forEach((r, idx) => {
    const statusClass = r.hasSubmission ? 'status-completed' : 'status-pending';
    const statusText = r.hasSubmission ? 'Completed' : 'Pending';
    const completedDate = r.completedAt ? new Date(r.completedAt).toLocaleDateString() : '—';
    const avgDisplay = r.averageScore !== null ? r.averageScore : '—';

    bodyHtml += `<tr class="main-row" onclick="toggleExpand(${idx})" style="cursor:pointer">`;
    bodyHtml += `<td>${esc(r.name)}</td>`;
    bodyHtml += `<td>${esc(r.company)}</td>`;
    bodyHtml += `<td class="${statusClass}">${statusText}</td>`;
    bodyHtml += `<td>${completedDate}</td>`;
    bodyHtml += `<td class="score-cell avg-cell">${avgDisplay}</td>`;
    cats.forEach(cat => {
      const avg = r.hasSubmission ? catAvg(r.scores, cat.ids) : null;
      const cls = avg !== null ? scoreClass(Math.round(parseFloat(avg))) : 'score-na';
      bodyHtml += `<td class="score-cell ${cls}">${avg !== null ? avg : '—'}</td>`;
    });
    bodyHtml += `<td><i class="bi bi-chevron-down text-muted"></i></td>`;
    bodyHtml += `</tr>`;

    bodyHtml += `<tr class="expand-row" id="expand-${idx}"><td colspan="${cols.length + 1}" class="expand-content p-3">`;
    if (r.hasSubmission && r.scores) {
      bodyHtml += '<div class="dim-grid">';
      cats.forEach(cat => {
        cat.ids.forEach(dimId => {
          const score = r.scores[dimId];
          const cls = score !== null && score !== undefined ? scoreClass(score) : 'score-na';
          const val = score !== null && score !== undefined ? score : '—';
          bodyHtml += `<div class="dim-item"><span class="dim-score-badge ${cls}">${val}</span>${esc(DIM_LABELS[dimId])}</div>`;
        });
      });
      bodyHtml += '</div>';
    } else {
      bodyHtml += '<p class="text-muted mb-0 small">No submission yet.</p>';
    }
    bodyHtml += '</td></tr>';
  });

  document.getElementById('table-body').innerHTML = bodyHtml;
}

function getSortValue(row, col) {
  if (col.startsWith('cat_')) {
    const catKey = col.replace('cat_', '');
    const cat = Object.values(CATEGORIES).find(c => c.key === catKey);
    if (!cat || !row.hasSubmission) return null;
    const avg = catAvg(row.scores, cat.ids);
    return avg !== null ? parseFloat(avg) : null;
  }
  return row[col];
}

function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

function toggleExpand(idx) {
  const row = document.getElementById('expand-' + idx);
  if (row) row.classList.toggle('open');
}

function scoreClass(score) {
  if (score === null || score === undefined) return 'score-na';
  return 'score-' + Math.max(1, Math.min(5, score));
}

function esc(str) {
  if (!str) return '';
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  return str.replace(/[&<>"']/g, c => map[c]);
}

function downloadCSV() {
  const cats = Object.values(CATEGORIES);
  const headers = ['Name', 'Company', 'Status', 'Completed At', 'Average Score'];
  ALL_DIM_IDS.forEach(id => headers.push(id));
  cats.forEach(cat => headers.push(cat.key + ' Avg'));

  const rows = data.map(r => {
    const row = [
      r.name,
      r.company,
      r.hasSubmission ? 'Completed' : 'Pending',
      r.completedAt || '',
      r.averageScore !== null ? r.averageScore : '',
    ];
    ALL_DIM_IDS.forEach(id => {
      const s = r.scores?.[id];
      row.push(s !== null && s !== undefined ? s : '');
    });
    cats.forEach(cat => {
      const avg = r.hasSubmission ? catAvg(r.scores, cat.ids) : null;
      row.push(avg !== null ? avg : '');
    });
    return row;
  });

  let csv = headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(',') + '\n';
  rows.forEach(row => {
    csv += row.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',') + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ai-readiness-scores.csv';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
